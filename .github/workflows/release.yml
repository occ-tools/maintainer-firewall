name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run release:check
      - name: Pack release asset
        run: |
          mkdir -p release-assets
          npm pack --pack-destination release-assets
      - name: Attest release asset
        id: attest
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: release-assets/*.tgz
      - name: Stage attestation bundle
        run: |
          version="${GITHUB_REF_NAME#v}"
          cp "${{ steps.attest.outputs.bundle-path }}" "release-assets/maintainer-firewall-${version}.tgz.sigstore.json"
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          generate_release_notes: true
          files: release-assets/*
